<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyOptimiser Ultimate v2026.3.41</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; }
        .input { background: #020617; border: 1px solid #334155; border-radius: 0.75rem; padding: 0.75rem; width: 100%; color: white; font-size: 0.85rem; }
        .tab { padding: 1.25rem 1.5rem; font-weight: 800; color: #94a3b8; border-bottom: 3px solid transparent; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .tab.active { color: #10b981; border-bottom-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .help-text { font-size: 0.7rem; color: #64748b; margin-top: 0.4rem; line-height: 1.4; font-style: italic; }
        .status-badge { padding: 0.3rem 0.6rem; border-radius: 0.5rem; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
        .badge-online { background: #064e3b; color: #34d399; }
        .badge-offline { background: #7f1d1d; color: #f87171; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen pb-48">
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center h-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg font-black">⚡</div>
                <div>
                    <h1 class="text-lg font-black tracking-tight leading-tight">EnergyOptimiser</h1>
                    <p id="v-string" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">v2026.3.41</p>
                </div>
            </div>
            <div class="flex overflow-x-auto no-scrollbar">
                <div onclick="showTab('dashboard')" class="tab active" id="t-dashboard">Status</div>
                <div onclick="showTab('system')" class="tab" id="t-system">Systeem</div>
                <div onclick="showTab('solar')" class="tab" id="t-solar">Zon</div>
                <div onclick="showTab('inverter')" class="tab" id="t-inverter">Inverter</div>
                <div onclick="showTab('logs')" class="tab" id="t-logs">Logs</div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8 max-w-5xl">
        <section id="p-dashboard" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="glass p-6 border-l-4 border-emerald-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Systeem</p>
                    <h2 id="s-enabled" class="text-xl font-black italic">-</h2>
                </div>
                <div class="glass p-6 border-l-4 border-blue-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Accu SOC</p>
                    <h2 id="s-soc" class="text-2xl font-black text-emerald-400">-%</h2>
                </div>
                <div class="glass p-6 border-l-4 border-slate-700">
                    <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Nordpool NL</p>
                    <div class="flex flex-wrap gap-2 mt-1">
                        <span id="b-prices" class="status-badge badge-offline">Prices</span>
                        <span id="b-ha" class="status-badge badge-offline">HA Sync</span>
                    </div>
                </div>
                <div class="glass p-6 border-l-4 border-blue-700 flex flex-col justify-center">
                    <button onclick="runTest()" class="bg-blue-600 hover:bg-blue-500 py-2 rounded text-[10px] font-black uppercase">🧪 Testrun</button>
                </div>
            </div>
            <div class="glass p-8 h-[400px] shadow-2xl">
                <canvas id="priceChart"></canvas>
            </div>
        </section>

        <form id="cfg-form" class="space-y-8">
            <section id="p-system" class="hidden space-y-6">
                <div class="glass p-8 space-y-8">
                    <h2 class="text-2xl font-black text-emerald-400 border-b border-slate-800 pb-4">Strategie & Kern</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="text-[10px] uppercase font-black text-slate-400">Optimalisatie Strategie</label>
                            <select name="strategy" class="input">
                                <option value="Hoogste Verdienen">Hoogste Verdienen (Arbitrage)</option>
                                <option value="Hoogst eigen gebruik">Hoogst eigen gebruik (Solar focus)</option>
                                <option value="0 op de meter">0 op de meter (Balans)</option>
                            </select>
                            <p class="help-text">Kies hoe de accu moet reageren op de Nordpool prijzen en zonnestroom.</p>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-black text-slate-400">Systeem Inschakelen</label>
                            <select name="enabled" class="input"><option value="true">Actief (Schrijft naar Inverter)</option><option value="false">Standby (Alleen monitoren)</option></select>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-black text-slate-400">Accu Capaciteit (kWh)</label>
                            <input type="number" step="0.1" name="battery_capacity_kwh" class="input">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-black text-slate-400">Max Laadsnelheid (kW)</label>
                            <input type="number" step="0.1" name="max_charge_rate_kw" class="input">
                        </div>
                    </div>
                </div>
            </section>

            <section id="p-solar" class="hidden space-y-6">
                <div class="glass p-8 space-y-8">
                    <div class="flex justify-between items-center"><h2 class="text-2xl font-black text-yellow-400">Zonnepanelen</h2><input type="checkbox" name="solar_enabled" class="w-6 h-6 accent-emerald-500"></div>
                    <div id="solar-list" class="space-y-2"></div>
                    <button type="button" onclick="addSolar()" class="w-full bg-slate-800 py-2 rounded text-xs font-bold">+ Set Toevoegen</button>
                </div>
            </section>

            <section id="p-inverter" class="hidden space-y-6">
                <div class="glass p-8 space-y-8">
                    <h2 class="text-2xl font-black text-emerald-400 border-b border-slate-800 pb-4">HA Entiteiten (Inverter)</h2>
                    <div><label class="text-[10px] uppercase font-black text-slate-400">SOC Sensor Entity</label><input type="text" name="solarman_battery_soc" class="input font-mono"></div>
                    <div id="reg-list" class="space-y-2 mt-4"></div>
                </div>
            </section>

            <section id="p-logs" class="hidden">
                <div class="glass p-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-black text-blue-400 uppercase">Applicatie Logboek</h2>
                        <button type="button" onclick="fetchLogs()" class="bg-slate-800 px-3 py-1 rounded text-[10px] font-black uppercase">Refresh</button>
                    </div>
                    <div id="log-window" class="bg-black/50 p-4 rounded h-[550px] overflow-y-auto font-mono text-[10px] text-slate-400 no-scrollbar border border-slate-800">Laden...</div>
                </div>
            </section>

            <div class="fixed bottom-0 left-0 right-0 p-6 bg-slate-950/90 backdrop-blur-md border-t border-slate-800 z-50">
                <div class="container mx-auto max-w-5xl"><button type="submit" class="bg-emerald-600 w-full py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-emerald-500 transition shadow-xl shadow-emerald-900/40">💾 Instellingen Opslaan</button></div>
            </div>
        </form>
    </main>

    <script>
        let chart = null, solarArrays = [];
        async function load() {
            try {
                const r = await fetch('/api/status'), d = await r.json();
                document.getElementById('s-enabled').innerText = d.config.enabled ? 'ACTIEF' : 'STANDBY';
                document.getElementById('s-enabled').className = d.config.enabled ? 'text-xl font-black italic text-emerald-400' : 'text-xl font-black italic text-rose-400';
                document.getElementById('s-soc').innerText = (d.current_soc || 0).toFixed(1) + '%';
                document.getElementById('s-update').innerText = d.last_update ? new Date(d.last_update).toLocaleTimeString('nl-NL') : '--:--';
                document.getElementById('v-string').innerText = d.version;
                
                updateBadge('b-prices', d.api_errors.prices);
                updateBadge('b-ha', d.api_errors.ha);

                const f = document.getElementById('cfg-form');
                f.enabled.value = d.config.enabled.toString();
                f.strategy.value = d.config.strategy;
                f.battery_capacity_kwh.value = d.config.battery_capacity_kwh;
                f.max_charge_rate_kw.value = d.config.max_charge_rate_kw;
                f.solarman_battery_soc.value = d.config.solarman_battery_soc;
                f.solar_enabled.checked = d.config.solar_enabled;

                const rList = document.getElementById('reg-list');
                if(!rList.children.length) {
                    for(let i=0; i<6; i++) {
                        const div = document.createElement('div'); div.className = 'grid grid-cols-4 gap-2 bg-slate-900/50 p-2 rounded border border-slate-800';
                        div.innerHTML = `<div class="text-[10px] font-bold text-slate-500 self-center">Slot ${i+1}</div>
                                         <input type="text" id="rt-${i}" value="${d.config.solarman_prog_times[i]}" class="input text-[10px] font-mono">
                                         <input type="text" id="rs-${i}" value="${d.config.solarman_prog_socs[i]}" class="input text-[10px] font-mono">
                                         <input type="text" id="rg-${i}" value="${d.config.solarman_prog_grid_charges[i]}" class="input text-[10px] font-mono">`;
                        rList.appendChild(div);
                    }
                }
                solarArrays = d.config.solar_arrays || []; renderSolar();
                updateChart(d.forecast);
            } catch(e) {}
        }

        function updateBadge(id, error) {
            const b = document.getElementById(id); if(!b) return;
            b.className = 'status-badge ' + (error === 'OK' ? 'badge-online' : 'badge-offline');
            b.title = error;
        }

        async function fetchLogs() {
            try {
                const r = await fetch('/api/logs'), d = await r.json();
                const w = document.getElementById('log-window');
                w.innerHTML = d.logs.map(l => {
                    const color = l.includes('ERROR') ? 'text-rose-400' : (l.includes('WARNING') ? 'text-amber-400' : 'text-slate-400');
                    return `<div class="mb-1 border-b border-white/5 pb-1 ${color}">${l}</div>`;
                }).join('');
                w.scrollTop = w.scrollHeight;
            } catch(e) {}
        }

        function renderSolar() {
            const l = document.getElementById('solar-list'); l.innerHTML = '';
            solarArrays.forEach((a,i) => {
                const div = document.createElement('div'); div.className = 'grid grid-cols-5 gap-2 bg-slate-900/30 p-2 rounded border border-slate-800 items-center';
                div.innerHTML = `<input type="text" value="${a.name}" onchange="solarArrays[${i}].name=this.value" class="input text-[10px]">
                                 <input type="number" step="0.1" value="${a.kwp}" onchange="solarArrays[${i}].kwp=parseFloat(this.value)" class="input text-[10px]">
                                 <input type="number" value="${a.tilt}" onchange="solarArrays[${i}].tilt=parseInt(this.value)" class="input text-[10px]">
                                 <input type="number" value="${a.azimuth}" onchange="solarArrays[${i}].azimuth=parseInt(this.value)" class="input text-[10px]">
                                 <button type="button" onclick="solarArrays.splice(${i},1);renderSolar()" class="text-rose-500 text-[10px] font-black">X</button>`;
                l.appendChild(div);
            });
        }
        function addSolar() { solarArrays.push({name:'Set', kwp:0, tilt:35, azimuth:180}); renderSolar(); }

        function showTab(id) {
            document.querySelectorAll('section, form section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('p-' + id).classList.remove('hidden');
            document.getElementById('t-' + id).classList.add('active');
            if(id === 'logs') { fetchLogs(); if(!window.logInterval) window.logInterval = setInterval(fetchLogs, 3000); }
            else { clearInterval(window.logInterval); window.logInterval = null; }
        }

        async function runTest() { await fetch('/api/testrun', {method:'POST'}); showTab('logs'); }

        function updateChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(i => i.time),
                    datasets: [{ label: 'Planning', data: data.map(i => i.price), borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16,185,129,0.05)' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        document.getElementById('cfg-form').onsubmit = async (e) => {
            e.preventDefault();
            const ts=[], ss=[], gs=[];
            for(let i=0; i<6; i++) { ts.push(document.getElementById(`rt-${i}`).value); ss.push(document.getElementById(`rs-${i}`).value); gs.push(document.getElementById(`rg-${i}`).value); }
            const cfg = {
                enabled: e.target.enabled.value === 'true', strategy: e.target.strategy.value, 
                battery_capacity_kwh: parseFloat(e.target.battery_capacity_kwh.value),
                max_charge_rate_kw: parseFloat(e.target.max_charge_rate_kw.value),
                solarman_battery_soc: e.target.solarman_battery_soc.value,
                solar_enabled: e.target.solar_enabled.checked,
                solar_arrays: solarArrays, solarman_prog_times: ts, solarman_prog_socs: ss, solarman_prog_grid_charges: gs
            };
            const r = await fetch('/api/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cfg) });
            if(r.ok) { alert('✅ Instellingen opgeslagen!'); load(); }
        };

        load(); setInterval(load, 30000);
    </script>
</body>
</html>
