<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyOptimiser Admin Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        .input { background: #020617; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.6rem; width: 100%; color: white; font-size: 0.8rem; }
        .tab { padding: 0.8rem 1.2rem; font-weight: 700; color: #94a3b8; border-bottom: 2px solid transparent; transition: 0.2s; cursor: pointer; }
        .tab.active { color: #10b981; border-bottom-color: #10b981; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center gap-2">
                <span class="text-xl">⚡</span>
                <span class="font-black">EnergyOptimiser <span class="text-[10px] text-slate-500">v2026.3.34</span></span>
            </div>
            <div class="flex overflow-x-auto no-scrollbar">
                <div onclick="showTab('dashboard')" class="tab active" id="t-dashboard">Status</div>
                <div onclick="showTab('config')" class="tab" id="t-config">Instellingen</div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-4xl pb-32">
        <section id="p-dashboard" class="space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass p-4 border-l-4 border-emerald-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Status</p>
                    <h2 id="s-enabled" class="font-black">-</h2>
                </div>
                <div class="glass p-4 border-l-4 border-blue-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Accu</p>
                    <h2 id="s-soc" class="font-black text-emerald-400">-%</h2>
                </div>
            </div>
            <div class="glass p-6">
                <canvas id="priceChart" height="250"></canvas>
            </div>
        </section>

        <section id="p-config" class="hidden space-y-6">
            <form id="cfg-form" class="space-y-6">
                <div class="glass p-6 space-y-4">
                    <h2 class="font-black text-emerald-400">Systeem</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="text-[10px] uppercase text-slate-500 font-bold">Enabled</label>
                            <select name="enabled" class="input"><option value="true">Actief</option><option value="false">Standby</option></select></div>
                        <div><label class="text-[10px] uppercase text-slate-500 font-bold">Accu Capaciteit (kWh)</label>
                            <input type="number" step="0.1" name="battery_capacity_kwh" class="input"></div>
                    </div>
                </div>
                <div class="glass p-6 space-y-4">
                    <h2 class="font-black text-emerald-400">Inverter (Solarman)</h2>
                    <div><label class="text-[10px] uppercase text-slate-500 font-bold">SOC Entity</label>
                        <input type="text" name="solarman_battery_soc" class="input font-mono"></div>
                    <div id="reg-list" class="space-y-2"></div>
                </div>
                <button type="submit" class="bg-emerald-600 w-full py-4 rounded-xl font-black uppercase tracking-widest hover:bg-emerald-500 transition">Instellingen Opslaan</button>
            </form>
        </section>
    </main>

    <script>
        let chart = null;
        async function load() {
            const r = await fetch('/api/status'), d = await r.json();
            document.getElementById('s-enabled').innerText = d.config.enabled ? 'ACTIEF' : 'STANDBY';
            document.getElementById('s-soc').innerText = (d.current_soc || 0).toFixed(1) + '%';
            
            const f = document.getElementById('cfg-form');
            f.enabled.value = d.config.enabled.toString();
            f.battery_capacity_kwh.value = d.config.battery_capacity_kwh;
            f.solarman_battery_soc.value = d.config.solarman_battery_soc;
            
            const list = document.getElementById('reg-list');
            if(!list.children.length) {
                for(let i=0; i<6; i++) {
                    const div = document.createElement('div');
                    div.className = 'grid grid-cols-3 gap-2';
                    div.innerHTML = `<input type="text" id="rt-${i}" value="${d.config.solarman_prog_times[i]}" class="input font-mono">
                                     <input type="text" id="rs-${i}" value="${d.config.solarman_prog_socs[i]}" class="input font-mono">
                                     <input type="text" id="rg-${i}" value="${d.config.solarman_prog_grid_charges[i]}" class="input font-mono">`;
                    list.appendChild(div);
                }
            }
            updateChart(d.forecast);
        }

        function showTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('p-' + id).classList.remove('hidden');
            document.getElementById('t-' + id).classList.add('active');
        }

        function updateChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(i => new Date(i.time).getHours() + ':00'),
                    datasets: [{ label: 'Prijs', data: data.map(i => i.price), borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16,185,129,0.1)' }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        document.getElementById('cfg-form').onsubmit = async (e) => {
            e.preventDefault();
            const ts=[], ss=[], gs=[];
            for(let i=0; i<6; i++) { ts.push(document.getElementById(`rt-${i}`).value); ss.push(document.getElementById(`rs-${i}`).value); gs.push(document.getElementById(`rg-${i}`).value); }
            const cfg = {
                enabled: e.target.enabled.value === 'true',
                battery_capacity_kwh: parseFloat(e.target.battery_capacity_kwh.value),
                solarman_battery_soc: e.target.solarman_battery_soc.value,
                solarman_prog_times: ts, solarman_prog_socs: ss, solarman_prog_grid_charges: gs
            };
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cfg) });
            alert('Opgeslagen!'); load();
        };

        load(); setInterval(load, 60000);
    </script>
</body>
</html>
